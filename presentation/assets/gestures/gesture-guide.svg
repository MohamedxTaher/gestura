<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Gestura gesture guide</title>
  <desc id="desc">Keyboard and mouse swipe gesture mappings used by the Gestura project.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#03070f"/>
      <stop offset="0.48" stop-color="#08182f"/>
      <stop offset="1" stop-color="#130a24"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#63f4ff"/>
      <stop offset="0.55" stop-color="#4f8cff"/>
      <stop offset="1" stop-color="#a66bff"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .title { fill: #f3f8ff; font: 800 54px Inter, Segoe UI, Arial, sans-serif; }
      .subtitle { fill: #9fb2ca; font: 500 24px Inter, Segoe UI, Arial, sans-serif; }
      .section { fill: #63f4ff; font: 800 22px Inter, Segoe UI, Arial, sans-serif; }
      .card-title { fill: #f3f8ff; font: 800 23px Inter, Segoe UI, Arial, sans-serif; }
      .meta { fill: #77ffc2; font: 800 15px Inter, Segoe UI, Arial, sans-serif; }
      .action { fill: #cfe0f4; font: 500 18px Inter, Segoe UI, Arial, sans-serif; }
      .small { fill: #8fa8c4; font: 500 14px Inter, Segoe UI, Arial, sans-serif; }
      .stroke { stroke: #63f4ff; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; fill: none; filter: url(#glow); }
      .stroke-purple { stroke: #a66bff; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; fill: none; filter: url(#glow); }
      .fill-cyan { fill: rgba(99,244,255,0.16); stroke: rgba(99,244,255,0.7); stroke-width: 2; }
      .grid { stroke: rgba(99,244,255,0.08); stroke-width: 1; }
    </style>
  </defs>

  <rect width="1400" height="900" fill="url(#bg)"/>
  <g opacity="0.72">
    <path class="grid" d="M0 90 H1400 M0 180 H1400 M0 270 H1400 M0 360 H1400 M0 450 H1400 M0 540 H1400 M0 630 H1400 M0 720 H1400 M0 810 H1400"/>
    <path class="grid" d="M100 0 V900 M200 0 V900 M300 0 V900 M400 0 V900 M500 0 V900 M600 0 V900 M700 0 V900 M800 0 V900 M900 0 V900 M1000 0 V900 M1100 0 V900 M1200 0 V900 M1300 0 V900"/>
  </g>
  <rect x="46" y="42" width="1308" height="816" rx="22" fill="rgba(2, 8, 18, 0.52)" stroke="rgba(99,244,255,0.24)" stroke-width="2"/>
  <rect x="46" y="42" width="1308" height="4" fill="url(#edge)" opacity="0.95"/>

  <text x="84" y="120" class="title">Gestura Gesture Guide</text>
  <text x="84" y="158" class="subtitle">Mappings shown here follow the current project control behavior.</text>

  <text x="84" y="226" class="section">Keyboard Mode</text>
  <text x="736" y="226" class="section">Mouse Swipe Mode</text>

  <g transform="translate(84 258)">
    <rect width="286" height="154" rx="14" fill="rgba(9,20,39,0.86)" stroke="rgba(99,244,255,0.35)"/>
    <text x="166" y="40" class="meta">Keyboard Mode</text>
    <path d="M62 92 V44 M88 94 V36 M114 92 V42 M140 96 V54 M166 108 V76 M62 92 C72 124 128 132 166 108" class="stroke"/>
    <text x="22" y="122" class="card-title">Open Palm</text>
    <text x="22" y="144" class="action">Up Arrow</text>
  </g>

  <g transform="translate(400 258)">
    <rect width="286" height="154" rx="14" fill="rgba(9,20,39,0.86)" stroke="rgba(99,244,255,0.35)"/>
    <text x="166" y="40" class="meta">Keyboard Mode</text>
    <path d="M76 88 C74 54 96 42 118 58 C136 42 162 50 168 78 C172 106 152 122 120 122 C94 122 78 108 76 88 Z" class="stroke"/>
    <text x="22" y="122" class="card-title">Fist</text>
    <text x="22" y="144" class="action">Space / Brake</text>
  </g>

  <g transform="translate(84 444)">
    <rect width="286" height="154" rx="14" fill="rgba(9,20,39,0.86)" stroke="rgba(99,244,255,0.35)"/>
    <text x="166" y="40" class="meta">Keyboard Mode</text>
    <path d="M86 96 V38 M126 96 V36 M166 110 V78 M72 108 C100 134 154 134 178 110" class="stroke"/>
    <text x="22" y="122" class="card-title">Peace Sign</text>
    <text x="22" y="144" class="action">Left Arrow</text>
  </g>

  <g transform="translate(400 444)">
    <rect width="286" height="154" rx="14" fill="rgba(9,20,39,0.86)" stroke="rgba(99,244,255,0.35)"/>
    <text x="166" y="40" class="meta">Keyboard Mode</text>
    <path d="M78 104 V40 M116 104 V34 M154 104 V44 M188 116 V86 M70 112 C104 140 164 140 194 116" class="stroke"/>
    <text x="22" y="122" class="card-title">Three Fingers</text>
    <text x="22" y="144" class="action">Down Arrow</text>
  </g>

  <g transform="translate(84 630)">
    <rect width="602" height="154" rx="14" fill="rgba(9,20,39,0.86)" stroke="rgba(99,244,255,0.35)"/>
    <path d="M88 104 V36 M132 116 V84 M166 118 V94 M198 118 V96 M72 112 C106 140 176 140 206 118" class="stroke"/>
    <path d="M255 88 H392 M364 60 L392 88 L364 116" class="stroke-purple"/>
    <text x="430" y="62" class="card-title">Index Finger</text>
    <text x="430" y="88" class="meta">Keyboard Mode</text>
    <text x="430" y="116" class="action">Right Arrow</text>
  </g>

  <g transform="translate(736 258)">
    <rect width="286" height="154" rx="14" fill="rgba(9,20,39,0.86)" stroke="rgba(166,107,255,0.36)"/>
    <text x="122" y="40" class="meta">Mouse Swipe Mode</text>
    <circle cx="94" cy="76" r="24" class="fill-cyan"/>
    <path d="M118 76 H186 M164 54 L186 76 L164 98" class="stroke-purple"/>
    <text x="22" y="122" class="card-title">Pinch + Move Right</text>
    <text x="22" y="144" class="action">Swipe Right</text>
  </g>

  <g transform="translate(1052 258)">
    <rect width="286" height="154" rx="14" fill="rgba(9,20,39,0.86)" stroke="rgba(166,107,255,0.36)"/>
    <text x="122" y="40" class="meta">Mouse Swipe Mode</text>
    <circle cx="176" cy="76" r="24" class="fill-cyan"/>
    <path d="M154 76 H86 M108 54 L86 76 L108 98" class="stroke-purple"/>
    <text x="22" y="122" class="card-title">Pinch + Move Left</text>
    <text x="22" y="144" class="action">Swipe Left</text>
  </g>

  <g transform="translate(736 444)">
    <rect width="286" height="154" rx="14" fill="rgba(9,20,39,0.86)" stroke="rgba(166,107,255,0.36)"/>
    <text x="122" y="40" class="meta">Mouse Swipe Mode</text>
    <circle cx="140" cy="94" r="24" class="fill-cyan"/>
    <path d="M140 84 V32 M118 54 L140 32 L162 54" class="stroke-purple"/>
    <text x="22" y="122" class="card-title">Pinch + Move Up</text>
    <text x="22" y="144" class="action">Swipe Up / Jump</text>
  </g>

  <g transform="translate(1052 444)">
    <rect width="286" height="154" rx="14" fill="rgba(9,20,39,0.86)" stroke="rgba(166,107,255,0.36)"/>
    <text x="122" y="40" class="meta">Mouse Swipe Mode</text>
    <circle cx="140" cy="58" r="24" class="fill-cyan"/>
    <path d="M140 68 V118 M118 96 L140 118 L162 96" class="stroke-purple"/>
    <text x="22" y="122" class="card-title">Pinch + Move Down</text>
    <text x="22" y="144" class="action">Swipe Down / Roll</text>
  </g>

  <text x="736" y="762" class="small">MediaPipe detects hand landmarks. The gesture classification/control layer is rule-based.</text>
</svg>
